<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bewerbung</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">ATS Karriereportal</a>
        <a class="btn btn-outline-light"
           th:href="@{/jobs/{id}(id=${job.id})}">
            Zurück zur Stelle
        </a>
    </div>
</nav>

<div class="container mt-5">

    <h1>Bewerbung einreichen</h1>
    <p class="text-muted">
        Stelle:
        <span th:text="${job.title}"></span>
    </p>

    <form class="mt-4"
          th:action="@{/apply/{id}(id=${job.id})}"
          th:object="${applicationForm}"
          method="post"
          enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Vorname</label>
            <input class="form-control" type="text" th:field="*{firstname}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Nachname</label>
            <input class="form-control" type="text" th:field="*{lastname}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">E-Mail</label>
            <input class="form-control" type="email" th:field="*{email}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Telefon</label>
            <input class="form-control" type="text" th:field="*{phone}">
        </div>

        <div class="mb-3">
            <label class="form-label">Lebenslauf als PDF</label>
            <input class="form-control" type="file" name="cv" accept="application/pdf" required>
        </div>

        <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" required>
            <label class="form-check-label">
                Ich stimme der Verarbeitung meiner Bewerbungsdaten zu.
            </label>
        </div>

        <button class="btn btn-success" type="submit">
            Bewerbung absenden
        </button>

    </form>

</div>

</body>
</html>
