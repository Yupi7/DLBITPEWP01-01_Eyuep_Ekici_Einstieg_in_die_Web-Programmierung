<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bewerbungen</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">ATS Karriereportal</a>

        <div>
            <a class="btn btn-outline-light me-2" href="/jobs">Zur Stellenliste</a>
            <a class="btn btn-outline-warning" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="mb-4">Recruiter-Dashboard</h1>

    <div class="alert alert-info" th:if="${#lists.isEmpty(applications)}">
        Es liegen aktuell keine Bewerbungen vor.
    </div>

    <div class="card mb-4" th:each="app : ${applications}">
        <div class="card-body">

            <h3 class="card-title">
                <span th:text="${app.firstname}"></span>
                <span th:text="${app.lastname}"></span>
            </h3>

            <p class="mb-1">
                <strong>E-Mail:</strong>
                <span th:text="${app.email}"></span>
            </p>

            <p class="mb-1">
                <strong>Telefon:</strong>
                <span th:text="${app.phone}"></span>
            </p>

            <p class="mb-1">
                <strong>Stelle:</strong>
                <span th:text="${app.job.title}"></span>
            </p>

            <p class="mb-1">
                <strong>Status:</strong>
                <span class="badge bg-secondary" th:text="${app.status}"></span>
            </p>

            <p class="mb-3">
                <strong>Lebenslauf:</strong>

                <span th:if="${app.cvFileName != null}">
                    <a th:href="@{/uploads/{file}(file=${app.cvFileName})}"
                       th:text="${app.cvFileName}">
                    </a>
                </span>

                <span th:if="${app.cvFileName == null}">
                    Keine Datei hochgeladen
                </span>
            </p>

            <form class="row g-2 mb-3"
                  th:action="@{/admin/applications/{id}/status(id=${app.id})}"
                  method="post">

                <div class="col-md-4">
                    <select class="form-select" name="status">
                        <option value="Eingegangen">Eingegangen</option>
                        <option value="In Prüfung">In Prüfung</option>
                        <option value="Interview">Interview</option>
                        <option value="Angenommen">Angenommen</option>
                        <option value="Abgelehnt">Abgelehnt</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <button class="btn btn-primary" type="submit">
                        Status ändern
                    </button>
                </div>

            </form>

            <form th:action="@{/admin/applications/{id}/note(id=${app.id})}"
                  method="post">

                <div class="mb-2">
                    <label class="form-label">
                        Interne Notiz
                    </label>

                    <textarea class="form-control"
                              name="note"
                              rows="3"
                              th:text="${app.note}">
                    </textarea>
                </div>

                <button class="btn btn-secondary" type="submit">
                    Notiz speichern
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
