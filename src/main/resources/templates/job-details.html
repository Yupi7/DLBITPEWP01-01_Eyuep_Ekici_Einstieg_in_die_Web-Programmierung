<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Stellendetails</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">ATS Karriereportal</a>
        <a class="btn btn-outline-light" href="/jobs">Zur Stellenliste</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card">
        <div class="card-body">
            <h1 class="card-title" th:text="${job.title}"></h1>

            <p class="text-muted mt-3">
                Standort:
                <span th:text="${job.location}"></span>
            </p>

            <hr>

            <h4>Beschreibung</h4>
            <p th:text="${job.description}"></p>

            <a class="btn btn-success mt-3"
               th:href="@{/apply/{id}(id=${job.id})}">
                Jetzt bewerben
            </a>
        </div>
    </div>

</div>

</body>
</html>
